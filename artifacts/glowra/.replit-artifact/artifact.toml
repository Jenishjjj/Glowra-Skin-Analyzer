kind = "mobile"
previewPath = "/"
title = "Glowra"
version = "1.0.0"
id = "artifacts/glowra"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20511

[services.development]
run = "pnpm --filter @workspace/glowra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/glowra", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/glowra", "run", "serve" ]

[services.env]
PORT = "20511"
BASE_PATH = "/"
